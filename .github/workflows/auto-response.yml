name: 自动响应
on:
  workflow_dispatch:
  issues:
    types: [opened, edited]

jobs:
  auto-response:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install PNPM
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build Project
        run: pnpm run build || echo "Build skipped"

      - name: Run Lobster
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # 这里是关键：使用 agent 模式并指定 wechat 协议，强制让它等待扫码
        run: pnpm exec openclaw agent --protocol wechat

 
